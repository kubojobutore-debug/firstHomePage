<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>お問い合わせフォーム</title>
</head>
<body>
    <h1>お問い合わせ内容</h1>

    <!-- 名前入力 -->
    <label for="name">名前</label><input type="text" id="name" name="name"><br>
    <!-- メールアドレス入力 -->
    <label for="email">メールアドレス</label><input type="email" id="email" ><br>
    <!-- お問い合わせチェックボックス -->
     <h3>お問い合わせ内容をチェックしてください(複数可)</h3>
    <div>
        <label for="StSbox">Slay the Spire</label><input type="checkbox" id="StSbox" ><br>
    </div>
    <div>
        <label for="PoEbox">Path of Exile</label><input type="checkbox" id="PoEbox" ><br>
    </div>
    <div>
        <label for="GBFbox">GranBlueFantasy</label><input type="checkbox" id="GBFbox" ><br>
    </div>

</body>
</html>
